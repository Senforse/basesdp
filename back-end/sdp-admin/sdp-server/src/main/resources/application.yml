server:
  port: 8080

# MyBatis / MyBatis-Plus 默认项见 sdp-system 模块内 application.yml

# Thymeleaf 配置
spring:
  thymeleaf:
    # 开启模板缓存（默认值： true）
    cache: true
    # 检查模板是否存在，然后再呈现
    check-template: false
    # 检查模板位置是否正确（默认值： true）
    check-template-location: true
    # Content-Type 的值（默认值： text/html）
    content-type: text/html
    # 开启 MVC Thymeleaf 视图解析（默认值： true）
    enabled: false
    # 模板编码
    encoding: UTF-8
    # 要被排除在解析之外的视图名称列表，用逗号分隔
    excluded-view-names:
    # 要运用于模板之上的模板模式。另见 StandardTemplate-ModeHandlers（默认值： HTML5）
    mode: HTML
    # 在构建 URL 时添加到视图名称前的前缀（默认值： classpath:/templates/）
    prefix: classpath:/templates/
    # 在构建 URL 时添加到视图名称后的后缀（默认值： .html）
    suffix: .html
  profiles:
    active: dev

sdp:
  logging:
    file:
      path: logs
      retention-days: 15
      max-file-size: 50MB
      total-size-cap: 5GB
    access:
      enabled: true
      include-query-string: true
      max-query-length: 2048
      db-enabled: false
      exclude-paths:
        - /actuator/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /v3/api-docs/**
      db-include-paths:
        - /api/auth/**
    archive:
      enabled: true
      cron: "0 30 3 * * ?"
      login-retention-days: 90
      access-retention-days: 30
      audit-retention-days: 180