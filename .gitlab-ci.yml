stages:
  - validate
  - test
  - build
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ""

default:
  tags:
    - sdpRunner
  interruptible: true

# ---------- 前端编译门禁（所有分支） ----------
lint-frontend:
  stage: validate
  image: dockerproxy.net/library/node:22-alpine
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - front-end/sdp-app-vue/node_modules/
  script:
    - cd front-end/sdp-app-vue
    - npm ci
    - npm run build

# ---------- 后端单元测试（所有分支） ----------
test-backend:
  stage: test
  image: dockerproxy.net/library/maven:3.9-eclipse-temurin-21
  cache:
    key: m2-$CI_COMMIT_REF_SLUG
    paths:
      - .m2/repository/
  script:
    - cd back-end/sdp-admin
    - mvn -pl sdp-server -am test -B

# ---------- Docker 镜像（仅 develop） ----------
.docker-build:
  stage: build
  image: dockerproxy.net/library/docker:24-cli
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - mkdir -p /etc/docker/certs.d/${CI_REGISTRY}
    - cp /etc/gitlab-runner/ca.crt /etc/docker/certs.d/${CI_REGISTRY}/ca.crt
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

docker-backend:
  extends: .docker-build
  script:
    - docker build
        -f deploy/docker/Dockerfile.backend
        -t "$CI_REGISTRY_IMAGE/sdp-server:$IMAGE_TAG"
        back-end/sdp-admin
    - docker push "$CI_REGISTRY_IMAGE/sdp-server:$IMAGE_TAG"

docker-frontend:
  extends: .docker-build
  script:
    - docker build
        -f deploy/docker/Dockerfile.frontend
        -t "$CI_REGISTRY_IMAGE/sdp-web:$IMAGE_TAG"
        .
    - docker push "$CI_REGISTRY_IMAGE/sdp-web:$IMAGE_TAG"

# ---------- 部署到测试服务器（本机 shell runner） ----------
deploy-test:
  stage: deploy
  tags:
    - sdpRunner    
  rules:
    - if: $CI_COMMIT_BRANCH == "main" 
  needs:
    - docker-backend
    - docker-frontend
  variables:
    DEPLOY_ROOT: /opt/sdp
  script:
    - export REGISTRY="$CI_REGISTRY_IMAGE"
    - export IMAGE_TAG="$CI_COMMIT_SHORT_SHA"
    - export DEPLOY_ROOT=/opt/sdp
    - install -d /opt/sdp
    - cp deploy/compose/docker-compose.yml /opt/sdp/
    - cp deploy/scripts/deploy.sh /opt/sdp/
    - cp deploy/scripts/health-check.sh /opt/sdp/
    - chmod +x /opt/sdp/deploy.sh /opt/sdp/health-check.sh
    - bash /opt/sdp/deploy.sh
  environment:
    name: test
    url: http://192.168.204.111:8090
